name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to rebuild and attach the DMG to (e.g. v1.1.1)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  # 1. Maintain a release PR from conventional commits; cut a release when merged.
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # 2. When a release is cut, build + sign + notarize the DMG and attach it.
  build:
    name: Build, Sign, Notarize & Attach DMG
    needs: release-please
    if: ${{ always() && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch') }}
    runs-on: macos-15
    env:
      GIT_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || needs.release-please.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.sha }}

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          xcodegen generate

      - name: SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint --strict

      - name: Test
        run: |
          xcodebuild test -project WorldCupBar.xcodeproj -scheme WorldCupBar \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO

      - name: Import signing certificate
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ci-keychain-pw
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/ci.keychain-db"
          echo -n "$DEVELOPER_ID_CERT_BASE64" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" \
            -P "$DEVELOPER_ID_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Leak-safe preflight: show identity TYPES (names/teams redacted), require a Developer ID Application cert.
          echo "Codesigning identities in CI keychain (names/teams redacted):"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | sed -E 's/[0-9A-F]{40}/<hash>/g; s/"([A-Za-z ]+):[^"]*"/"\1: <redacted>"/g'
          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q "Developer ID Application"; then
            echo "::error::Imported .p12 has no 'Developer ID Application' certificate (you likely exported 'Apple Development'). Export the Developer ID Application cert WITH its private key and update DEVELOPER_ID_CERT_BASE64 / DEVELOPER_ID_CERT_PASSWORD."
            exit 1
          fi

      - name: Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project WorldCupBar.xcodeproj -scheme WorldCupBar -configuration Release \
            -archivePath "$RUNNER_TEMP/WorldCupBar.xcarchive" \
            MARKETING_VERSION="${GIT_TAG#v}" CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY="Developer ID Application"

      - name: Generate ExportOptions.plist (team ID from secret)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          PLIST="$RUNNER_TEMP/ExportOptions.plist"
          plutil -create xml1 "$PLIST"
          plutil -insert method -string developer-id "$PLIST"
          plutil -insert teamID -string "$APPLE_TEAM_ID" "$PLIST"
          plutil -insert signingStyle -string manual "$PLIST"

      - name: Export (developer-id)
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/WorldCupBar.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Notarize & staple app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          APP="$RUNNER_TEMP/export/WorldCupBar.app"
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/app.zip"
          xcrun notarytool submit "$RUNNER_TEMP/app.zip" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          xcrun stapler staple "$APP"

      - name: Package DMG
        run: ./scripts/make-dmg.sh "$RUNNER_TEMP/export/WorldCupBar.app" dist

      - name: Sign, notarize & staple DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          DMG="dist/WorldCupBar-${GIT_TAG#v}.dmg"
          codesign --force --sign "Developer ID Application" --timestamp "$DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          xcrun stapler staple "$DMG"

      - name: Generate Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          REPO: ${{ github.repository }}
          SPARKLE_TOOLS_VERSION: "2.9.3"
        run: |
          echo -n "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_key"
          curl -Lso "$RUNNER_TEMP/sparkle.tar.xz" \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_TOOLS_VERSION}/Sparkle-${SPARKLE_TOOLS_VERSION}.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar -xJf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"
          "$RUNNER_TEMP/sparkle/bin/generate_appcast" \
            --ed-key-file "$RUNNER_TEMP/sparkle_key" \
            --link "https://github.com/${REPO}" \
            --download-url-prefix "https://github.com/${REPO}/releases/download/${GIT_TAG}/" \
            dist/
          cp dist/appcast.xml appcast.xml

      - name: Attach DMG + appcast to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp dist/WorldCupBar-*.dmg dist/WorldCupBar.dmg
          gh release upload "$GIT_TAG" dist/WorldCupBar-*.dmg dist/WorldCupBar.dmg appcast.xml --clobber
