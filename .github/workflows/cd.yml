name: CD — Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build, Sign, Notarize, Release (DMG)
    runs-on: macos-15
    env:
      # Pin to env var so shell steps never interpolate the ref directly
      GIT_TAG: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Swift packages
        run: swift package resolve

      - name: SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint --strict

      - name: Run tests
        run: swift test

      # ── Import Developer ID certificate into a temp keychain ──────────────
      - name: Import signing certificate
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ci-keychain-pw
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/ci.keychain-db"
          echo -n "$DEVELOPER_ID_CERT_BASE64" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" \
            -P "$DEVELOPER_ID_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      # ── Build + bundle + Developer-ID sign (build-app.sh embeds Sparkle.framework,
      #    copies resource bundles, fixes the rpath, signs with hardened runtime) ──
      - name: Build, bundle & sign app
        env:
          SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
          ENTITLEMENTS: Sources/WorldCupBar/WorldCupBar.entitlements
          UNIVERSAL: "1"
        run: |
          MARKETING_VERSION="${GIT_TAG#v}" ./scripts/build-app.sh

      # ── Notarize the app and staple it (so it's trusted offline once dragged out) ──
      - name: Notarize & staple app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          ditto -c -k --keepParent "dist/World Cup Bar.app" "$RUNNER_TEMP/app.zip"
          xcrun notarytool submit "$RUNNER_TEMP/app.zip" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          xcrun stapler staple "dist/World Cup Bar.app"

      # ── Package the (stapled) app into a drag-to-Applications DMG ─────────
      - name: Package DMG
        run: ./scripts/make-dmg.sh

      # ── Sign, notarize, and staple the DMG itself ────────────────────────
      - name: Sign, notarize & staple DMG
        env:
          DEVELOPER_ID_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          DMG="dist/WorldCupBar-${GIT_TAG#v}.dmg"
          codesign --force --sign "$DEVELOPER_ID_IDENTITY" --timestamp "$DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          xcrun stapler staple "$DMG"

      # ── Generate the Sparkle appcast (signs the DMG with your EdDSA key) ──
      - name: Generate Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          echo -n "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_key"
          SPARKLE_VERSION=$(python3 -c \
            "import json; pins=json.load(open('Package.resolved'))['pins']; \
            print(next(p['state']['version'] for p in pins if 'sparkle' in p['location'].lower()))")
          curl -Lso "$RUNNER_TEMP/sparkle.tar.xz" \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar -xJf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"
          # generate_appcast scans dist/ for the .dmg, computes its EdDSA signature + version
          "$RUNNER_TEMP/sparkle/bin/generate_appcast" \
            --ed-key-file "$RUNNER_TEMP/sparkle_key" \
            --link "https://michilotl.github.io/world-cup-bar" \
            --download-url-prefix "https://github.com/${{ github.repository }}/releases/download/${GIT_TAG}/" \
            dist/
          cp dist/appcast.xml appcast.xml

      # ── Publish the DMG + appcast as a GitHub Release ────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/WorldCupBar-*.dmg
            appcast.xml
          generate_release_notes: true
