name: CD — Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build, Sign, Notarize, Release (DMG)
    runs-on: macos-15
    env:
      GIT_TAG: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The .xcodeproj is generated from project.yml (not committed), so build it here.
      - name: Generate Xcode project
        run: |
          brew install xcodegen
          xcodegen generate

      - name: SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint --strict

      - name: Test
        run: |
          xcodebuild test -project WorldCupBar.xcodeproj -scheme WorldCupBar \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO

      # ── Import the Developer ID Application cert into a temp keychain ─────
      - name: Import signing certificate
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ci-keychain-pw
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/ci.keychain-db"
          echo -n "$DEVELOPER_ID_CERT_BASE64" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" \
            -P "$DEVELOPER_ID_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain
          # Allow codesign to use the key non-interactively
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      # ── Archive (Release, Developer ID) — Xcode embeds Sparkle + the icon ─
      - name: Archive
        env:
          DEVELOPER_ID_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
        run: |
          xcodebuild archive \
            -project WorldCupBar.xcodeproj -scheme WorldCupBar -configuration Release \
            -archivePath "$RUNNER_TEMP/WorldCupBar.xcarchive" \
            MARKETING_VERSION="${GIT_TAG#v}" CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY="$DEVELOPER_ID_IDENTITY"

      - name: Export (developer-id)
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/WorldCupBar.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist ExportOptions.plist

      # ── Notarize + staple the app (trusted offline once dragged out) ─────
      - name: Notarize & staple app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          APP="$RUNNER_TEMP/export/WorldCupBar.app"
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/app.zip"
          xcrun notarytool submit "$RUNNER_TEMP/app.zip" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          xcrun stapler staple "$APP"

      - name: Package DMG
        run: ./scripts/make-dmg.sh "$RUNNER_TEMP/export/WorldCupBar.app" dist

      # ── Sign, notarize & staple the DMG ──────────────────────────────────
      - name: Sign, notarize & staple DMG
        env:
          DEVELOPER_ID_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          DMG="dist/WorldCupBar-${GIT_TAG#v}.dmg"
          codesign --force --sign "$DEVELOPER_ID_IDENTITY" --timestamp "$DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          xcrun stapler staple "$DMG"

      # ── Sign the Sparkle appcast and publish the Release ─────────────────
      - name: Generate Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          REPO: ${{ github.repository }}
        run: |
          echo -n "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_key"
          SPARKLE_VERSION=$(python3 -c \
            "import json; pins=json.load(open('Package.resolved'))['pins']; \
            print(next(p['state']['version'] for p in pins if 'sparkle' in p['location'].lower()))")
          curl -Lso "$RUNNER_TEMP/sparkle.tar.xz" \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar -xJf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"
          "$RUNNER_TEMP/sparkle/bin/generate_appcast" \
            --ed-key-file "$RUNNER_TEMP/sparkle_key" \
            --link "https://github.com/${REPO}" \
            --download-url-prefix "https://github.com/${REPO}/releases/download/${GIT_TAG}/" \
            dist/
          cp dist/appcast.xml appcast.xml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/WorldCupBar-*.dmg
            appcast.xml
          generate_release_notes: true
